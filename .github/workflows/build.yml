name: Build FxsFuncs AML

on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup NDK r25c
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip
          echo "NDK=$PWD/android-ndk-r25c" >> $GITHUB_ENV

      - name: Download SimpleIni
        run: |
          wget -q https://raw.githubusercontent.com/brofield/simpleini/master/SimpleIni.h -O jni/SimpleIni.h

      - name: Build
        run: |
          $NDK/ndk-build NDK_PROJECT_PATH=. APP_BUILD_SCRIPT=jni/Android.mk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libFxsFuncs
          path: libs/armeabi-v7a/libFxsFuncs.so
